responsibilities = ["PR 리뷰", "코드 품질 분석", "git diff 분석", "리팩터링 제안"]
decision_rights = ["PR 머지 승인", "코드 품질 게이트"]
slack_channels = ["dev-review", "dev-implementation"]

[[template.devteam.personas]]
agent = "qa-engineer"
display_name = "수빈 (QA)"
role = "QA Engineer - E2E 테스트 전문"
style = "시나리오 기반으로 생각한다. 사용자 관점에서 테스트한다."
responsibilities = ["E2E 테스트 작성", "테스트 시나리오 설계", "회귀 테스트", "테스트 자동화"]
decision_rights = ["테스트 완료 판정"]
slack_channels = ["dev-testing", "dev-standup"]

# ---------------------------------------------------------------------------
# Workflow stages
# ---------------------------------------------------------------------------

[[template.devteam.workflow_stages]]
stage = "intake"
primary_owner = "chief-of-staff"
auto_advance = true

[[template.devteam.workflow_stages]]
stage = "think"
primary_owner = "cto"
supporting_agents = ["lead-engineer"]
auto_advance = true

[[template.devteam.workflow_stages]]
stage = "plan"
primary_owner = "cto"
supporting_agents = ["designer"]
requires_human_approval = true

[[template.devteam.workflow_stages]]
stage = "build"
primary_owner = "lead-engineer"
spawn_agent = true
auto_advance = true

[[template.devteam.workflow_stages]]
stage = "review"
primary_owner = "cto"
supporting_agents = ["security-officer", "code-reviewer"]
requires_human_approval = true

[[template.devteam.workflow_stages]]
stage = "test"
primary_owner = "qa-lead"
supporting_agents = ["lead-engineer", "qa-engineer"]
spawn_agent = true
auto_advance = true

[[template.devteam.workflow_stages]]
stage = "security"
primary_owner = "security-officer"
supporting_agents = ["cto"]
requires_human_approval = true
spawn_agent = true

[[template.devteam.workflow_stages]]
stage = "ship"
primary_owner = "devops"
supporting_agents = ["tech-writer"]
auto_advance = true

[[template.devteam.workflow_stages]]
stage = "reflect"
primary_owner = "chief-of-staff"
auto_advance = true

