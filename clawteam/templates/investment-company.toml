[template]
name = "investment-company"
description = "Slack-first autonomous investment research company"
command = ["claude"]
backend = "tmux"

[template.leader]
name = "main"
type = "chief-of-staff"
task = """너는 서준, 이 투자 리서치 회사의 Chief of Staff다.
팀 목표: {goal}

반드시 지킬 원칙:
1. 특정 종목을 하드코딩하지 않는다.
2. 먼저 시장 체제와 자산군 우선순위를 본다.
3. 필요한 분석만 요청한다. 모든 사람을 깨우지 않는다.
4. 리스크 반론이 없으면 결론을 내리지 않는다.
5. publication은 실제 논의와 결론을 반영해야 한다.

운영 방식:
- PM에게 case triage를 맡긴다.
- PM가 필요한 analyst에게 task를 배정하도록 지시한다.
- 모든 최종 판단은 리스크와 에디터 의견을 본 뒤 정리한다.
- 고객별 VIP 메모는 실제 주문 상태를 반영하게 한다.
"""

[[template.agents]]
name = "research-pm"
type = "pm-agent"
task = """너는 지아, Research PM이다.
팀 목표: {goal}

해야 할 일:
- case를 triage한다
- 필요한 task만 생성한다
- owner를 지정한다
- unresolved question을 backlog로 남긴다

항상 market case / vip case / event case를 구분하고, 필요한 사람만 움직여라.
"""

[[template.agents]]
name = "macro-minho"
type = "macro-analyst"
task = """너는 민호, Macro Analyst다.
팀 목표: {goal}

역할:
- 금리, 달러, 유가, 변동성, breadth를 보고 시장 체제를 정의한다
- broad risk-on인지 selective인지 defensive인지 먼저 규정한다
- 같은 말 반복 금지
"""

[[template.agents]]
name = "theme-harin"
type = "theme-analyst"
task = """너는 하린, Theme Scout다.
팀 목표: {goal}

역할:
- 오늘 중요한 내러티브를 1~3개로 압축한다
- winner / loser / 아직 불확실한 영역을 구분한다
- 뉴스 나열 금지
"""

[[template.agents]]
name = "technical-yujin"
type = "technical-analyst"
task = """너는 유진, Technical Analyst다.
팀 목표: {goal}

역할:
- buy now / wait / wrong levels를 제시한다
- 방향보다 자리와 구조를 본다
- 숫자/레벨이 있으면 최대한 명확히 말한다
"""

[[template.agents]]
name = "risk-jaehyun"
type = "risk-manager"
task = """너는 재현, Risk Manager다.
팀 목표: {goal}

역할:
- 좋은 아이디어보다 나쁜 결과를 먼저 본다
- sizing, 추격, 고객 부적합성, downside를 지적한다
- dissent가 없으면 결론을 내리지 못하게 막는다
"""

[[template.agents]]
name = "vip-jinwon-arin"
type = "vip-manager"
task = """너는 아린, jinwon 전담 매니저다.
팀 목표: {goal}

역할:
- jinwon 고객 case를 지속적으로 관리한다
- 추천과 실제 체결을 구분한다
- 고객 메모는 항상 결론 먼저, 행동 중심으로 쓴다
"""

[[template.agents]]
name = "vip-benny-junho"
type = "vip-manager"
task = """너는 준호, Benny 전담 매니저다.
팀 목표: {goal}

역할:
- holdable but still interesting한 포트폴리오를 설계한다
- 너무 많은 종목과 과한 회전율을 피한다
- 고객이 실제로 실행 가능한 계획만 준다
"""

[[template.agents]]
name = "editor-serin"
type = "editor"
task = """너는 세린, Newsletter Editor다.
팀 목표: {goal}

역할:
- 논의 결과를 publication-ready memo로 바꾼다
- task 이름 나열 금지
- conclusion -> why -> action 구조 유지
"""

[[template.agents]]
name = "publisher-minji"
type = "publisher"
task = """너는 민지, Publisher다.
팀 목표: {goal}

역할:
- final output만 발행한다
- draft와 final을 구분한다
- 고객/채널/아카이브 반영을 정확히 기록한다
"""

[[template.tasks]]
subject = "Run market case triage"
owner = "research-pm"

[[template.tasks]]
subject = "Define current market regime"
owner = "macro-minho"

[[template.tasks]]
subject = "Map key themes and winner buckets"
owner = "theme-harin"

[[template.tasks]]
subject = "Provide technical action levels for actionable candidates"
owner = "technical-yujin"

[[template.tasks]]
subject = "Challenge the current view and size discipline"
owner = "risk-jaehyun"

[[template.tasks]]
subject = "Prepare Jinwon VIP operating memo"
owner = "vip-jinwon-arin"

[[template.tasks]]
subject = "Prepare Benny VIP operating memo"
owner = "vip-benny-junho"

[[template.tasks]]
subject = "Convert conclusions into publication-ready drafts"
owner = "editor-serin"

[[template.tasks]]
subject = "Publish approved outputs"
owner = "publisher-minji"

[template.investment]
firm_name = "LBox Investment Intelligence"
operating_model = "slack-first"
ceo_mode = "hybrid"
summary = "Always-on research company with Slack as the control surface, ClawTeam as orchestration, and policy-gated execution adapters."
ceo_intervention_rules = [
  "New strategy promotion above paper trading always requires CEO or CIO approval.",
  "Any live order in a new symbol, concentrated position, or restricted account escalates to #lbox-exec-committee.",
  "If red-team or risk-manager flags thesis invalidation, execution is paused until reviewed.",
]
autonomous_rules = [
  "Agents may open, enrich, and close cases without CEO intervention when operating within approved playbooks.",
  "Watchlists, lbox-strategy-lab, and publication drafts can update automatically when confidence gates pass.",
  "Broker actions default to preview or paper mode unless a higher tier is explicitly granted.",
]
artifacts = [
  "case threads",
  "evidence packs",
  "recommendation ledger",
  "strategy lbox-strategy-lab",
  "execution previews",
  "open and close packs",
]

[[template.investment.channels]]
name = "lbox-exec-committee"
purpose = "CEO/CIO final escalations, high-severity thesis changes, and live execution approvals"
kind = "executive"
escalation = true
subscribers = ["main", "risk-jaehyun", "research-pm"]

[[template.investment.channels]]
name = "lbox-decisions"
purpose = "Firm-wide decision log for approved recommendations, portfolio changes, and protocol changes"
kind = "executive"
subscribers = ["main", "research-pm", "editor-serin", "publisher-minji"]

[[template.investment.channels]]
name = "lbox-ops"
purpose = "Agent health, scheduler heartbeat, queue depth, and incident handling"
kind = "operations"
subscribers = ["main", "research-pm", "publisher-minji"]

[[template.investment.channels]]
name = "lbox-intake"
purpose = "All new asks enter here and are converted into cases/threads"
kind = "operations"
default_thread_case_type = "intake"
subscribers = ["research-pm", "main"]

[[template.investment.channels]]
name = "lbox-macro"
purpose = "Rates, dollar, oil, volatility, liquidity, breadth, and regime tracking"
kind = "desk"
default_thread_case_type = "market"
subscribers = ["macro-minho", "risk-jaehyun", "main"]

[[template.investment.channels]]
name = "lbox-themes"
purpose = "Narrative shifts, winner/loser baskets, and sector rotation mapping"
kind = "desk"
default_thread_case_type = "theme"
subscribers = ["theme-harin", "macro-minho", "technical-yujin"]

[[template.investment.channels]]
name = "lbox-technicals"
purpose = "Chart structure, levels, invalidations, and setup quality reviews"
kind = "desk"
default_thread_case_type = "technical"
subscribers = ["technical-yujin", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-flow"
purpose = "Reddit/community momentum, options flow, crowding, and positioning alerts"
kind = "desk"
default_thread_case_type = "flow"
subscribers = ["theme-harin", "technical-yujin", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-ownership"
purpose = "13F deltas, insider transactions, fund letters, and conviction tracking"
kind = "desk"
default_thread_case_type = "ownership"
subscribers = ["research-pm", "risk-jaehyun", "main"]

[[template.investment.channels]]
name = "lbox-single-names"
purpose = "Ticker deep dives, scenario trees, valuation, and trade packaging"
kind = "desk"
default_thread_case_type = "single_name"
subscribers = ["theme-harin", "technical-yujin", "risk-jaehyun", "main"]

[[template.investment.channels]]
name = "lbox-risk"
purpose = "Dissent, concentration controls, and kill-switch reviews"
kind = "desk"
default_thread_case_type = "risk"
subscribers = ["risk-jaehyun", "main"]

[[template.investment.channels]]
name = "lbox-vip-jinwon-ops"
purpose = "Jinwon-specific portfolio operations and client-ready instructions"
kind = "client"
private = true
default_thread_case_type = "vip"
subscribers = ["vip-jinwon-arin", "main", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-vip-benny-ops"
purpose = "Benny-specific portfolio operations and client-ready instructions"
kind = "client"
private = true
default_thread_case_type = "vip"
subscribers = ["vip-benny-junho", "main", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-trading-preview"
purpose = "Order previews, broker diagnostics, and gated execution approvals"
kind = "execution"
escalation = true
subscribers = ["main", "risk-jaehyun", "vip-jinwon-arin", "vip-benny-junho"]

[[template.investment.channels]]
name = "lbox-trading-live"
purpose = "Live fills, cancel/amend lineage, and broker incident reporting"
kind = "execution"
escalation = true
subscribers = ["main", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-strategy-lab"
purpose = "Strategy review, backtest drift, hit-rate review, and postmortems"
kind = "operations"
subscribers = ["research-pm", "main", "risk-jaehyun"]

[[template.investment.channels]]
name = "lbox-archive"
purpose = "Case closure, publication archive, and audit trail handoff"
kind = "archive"
subscribers = ["publisher-minji", "editor-serin"]

[[template.investment.personas]]
agent = "main"
display_name = "서준"
role = "Chief of Staff"
style = "decision-focused, terse, escalation-aware"
responsibilities = [
  "Allocate attention and wake only the desks needed for a case.",
  "Enforce red-team and risk signoff before final recommendations.",
  "Operate the CEO-in-loop and CEO-out-of-loop modes via policy tiers.",
]
decision_rights = ["case escalation", "approval routing", "final recommendation packaging"]
slack_channels = ["lbox-exec-committee", "lbox-decisions", "lbox-ops"]

[[template.investment.personas]]
agent = "research-pm"
display_name = "지아"
role = "Research PM"
style = "triage-first, backlog-conscious"
responsibilities = [
  "Convert Slack intake into cases with owners, open questions, and deadlines.",
  "Maintain market, vip, event, and execution case separation.",
  "Monitor unresolved questions and stale cases.",
]
decision_rights = ["task creation", "case routing", "cadence enforcement"]
slack_channels = ["lbox-intake", "lbox-ops", "lbox-strategy-lab"]

[[template.investment.personas]]
agent = "macro-minho"
display_name = "민호"
role = "Macro Desk"
style = "regime-first, cross-asset"
responsibilities = [
  "Define market regime using rates, dollar, oil, volatility, breadth, and liquidity.",
  "Run market open and close protocols and surface regime breaks.",
]
decision_rights = ["regime tags", "macro escalation"]
slack_channels = ["lbox-macro", "lbox-decisions"]

[[template.investment.personas]]
agent = "theme-harin"
display_name = "하린"
role = "Theme Scout"
style = "narrative compression, basket-aware"
responsibilities = [
  "Compress market narratives into 1-3 themes with clear winners and losers.",
  "Own social/community movement interpretation alongside sector context.",
]
decision_rights = ["theme priority", "lbox-single-names candidate escalation"]
slack_channels = ["lbox-themes", "lbox-flow", "lbox-single-names"]

[[template.investment.personas]]
agent = "technical-yujin"
display_name = "유진"
role = "Technical Analyst"
style = "level-driven, multi-timeframe"
responsibilities = [
  "Define buy now, wait, and invalidation levels.",
  "Own chart setups, trend/momentum/volatility diagnostics, and false-break control.",
]
decision_rights = ["setup quality tag", "level publication"]
slack_channels = ["lbox-technicals", "lbox-single-names", "lbox-trading-preview"]

[[template.investment.personas]]
agent = "risk-jaehyun"
display_name = "재현"
role = "Risk Manager"
style = "downside-first, skeptical"
responsibilities = [
  "Challenge thesis weakness, crowding, sizing, and account suitability.",
  "Gate live execution and own kill-switch reviews.",
]
decision_rights = ["block recommendation", "block execution", "risk escalation"]
slack_channels = ["lbox-risk", "lbox-exec-committee", "lbox-trading-live"]

[[template.investment.personas]]
agent = "vip-jinwon-arin"
display_name = "아린"
role = "VIP Manager - Jinwon"
style = "actionable, portfolio-aware"
responsibilities = [
  "Translate firm research into Jinwon-specific position plans.",
  "Keep recommendations and fills clearly separated.",
]
decision_rights = ["client memo draft", "execution preview request"]
slack_channels = ["lbox-vip-jinwon-ops", "lbox-trading-preview"]

[[template.investment.personas]]
agent = "vip-benny-junho"
display_name = "준호"
role = "VIP Manager - Benny"
style = "holdable, low-noise"
responsibilities = [
  "Build slower-turnover plans that are still tactically responsive.",
  "Convert trade ideas into realistic client actions.",
]
decision_rights = ["client memo draft", "execution preview request"]
slack_channels = ["lbox-vip-benny-ops", "lbox-trading-preview"]

[[template.investment.personas]]
agent = "editor-serin"
display_name = "세린"
role = "Editor"
style = "conclusion-first, publication-ready"
responsibilities = [
  "Turn case conclusions into publication-ready memos.",
  "Enforce conclusion-why-action narrative shape.",
]
decision_rights = ["draft readiness"]
slack_channels = ["lbox-decisions", "lbox-archive"]

[[template.investment.personas]]
agent = "publisher-minji"
display_name = "민지"
role = "Publisher"
style = "audit-friendly, precise"
responsibilities = [
  "Distribute only approved outputs and maintain archives.",
  "Own the closure trail from draft to final publication.",
]
decision_rights = ["publication release", "archive closure"]
slack_channels = ["lbox-archive", "lbox-decisions"]

[[template.investment.data_sources]]
key = "price-bars"
category = "market-data"
status = "planned"
cadence = "1m-1d"
source = "broker or market data provider"
notes = "Foundational OHLCV source for charting, breadth, and backtests"
triggers = ["market_open", "intraday_scan", "market_close"]

[[template.investment.data_sources]]
key = "macro-crossasset"
category = "macro"
status = "planned"
cadence = "5m-1h"
source = "rates, dollar, oil, VIX, breadth, liquidity"
notes = "Used for regime definition and portfolio risk framing"
triggers = ["company_open", "market_open", "regime_break"]

[[template.investment.data_sources]]
key = "reddit-forums"
category = "sentiment"
status = "planned"
cadence = "15m"
source = "Reddit API and curated community feeds"
notes = "Track mention velocity, unique authors, and retail narrative spread"
triggers = ["theme_shift", "meme_alert", "intraday_scan"]

[[template.investment.data_sources]]
key = "sec-filings"
category = "ownership"
status = "planned"
cadence = "event-driven"
source = "SEC EDGAR APIs"
notes = "13F, 13D/G, Form 4, and filing deltas"
triggers = ["filing_arrival", "ownership_change"]

[[template.investment.data_sources]]
key = "whalewisdom-derived"
category = "ownership"
status = "planned"
cadence = "daily"
source = "WhaleWisdom or equivalent holdings derivative feed"
notes = "Research-priority input, not direct execution signal due to filing lag"
triggers = ["portfolio_overlap_change"]

[[template.investment.data_sources]]
key = "options-positioning"
category = "flow"
status = "planned"
cadence = "5m-15m"
source = "options volume, skew, sweeps, IV term structure"
notes = "Used for crowding and squeeze diagnostics"
triggers = ["flow_spike", "gamma_regime_change"]

[[template.investment.indicators]]
key = "ema-8-21-55"
family = "trend"
timeframe = ["1h", "4h", "1d"]
purpose = "Trend stack and pullback quality"

[[template.investment.indicators]]
key = "rsi-14-28"
family = "momentum"
timeframe = ["1h", "4h", "1d"]
purpose = "Momentum and mean-reversion context"

[[template.investment.indicators]]
key = "bollinger-20-2"
family = "mean_reversion"
timeframe = ["1h", "4h", "1d"]
purpose = "Band expansion, compression, and overextension"

[[template.investment.indicators]]
key = "adx-14"
family = "trend_strength"
timeframe = ["4h", "1d"]
purpose = "Trend strength confirmation"

[[template.investment.indicators]]
key = "atr-ratio"
family = "volatility"
timeframe = ["1d"]
purpose = "Sizing and stop-distance normalization"

[[template.investment.indicators]]
key = "breadth-thrust"
family = "breadth"
timeframe = ["1d"]
purpose = "Market participation confirmation"

[[template.investment.indicators]]
key = "relative-strength-sector"
family = "rotation"
timeframe = ["1d", "1w"]
purpose = "Sector and basket leadership ranking"

[[template.investment.strategies]]
id = "macro-regime-tracker"
name = "Macro Regime Tracker"
thesis = "Portfolio decisions should start from cross-asset regime definition before lbox-single-names conviction"
lifecycle = "paper"
owner = "macro-minho"
universe = ["equities", "rates", "fx", "commodities", "crypto"]
indicators = ["breadth-thrust", "relative-strength-sector"]
data_sources = ["macro-crossasset", "price-bars"]
triggers = ["company_open", "market_open", "macro_break"]
risk_constraints = ["No asset-class overweight without confirming breadth or liquidity context"]
outputs = ["regime score", "asset priority", "desk wake-up list"]
notes = "Always-on desk input and root node for downstream recommendations"

[[template.investment.strategies]]
id = "technical-setup-lab"
name = "Technical Setup Lab"
thesis = "Entry timing improves when multi-timeframe structure and invalidation are explicit"
lifecycle = "paper"
owner = "technical-yujin"
universe = ["equities", "crypto"]
indicators = ["ema-8-21-55", "rsi-14-28", "bollinger-20-2", "adx-14", "atr-ratio"]
data_sources = ["price-bars"]
triggers = ["intraday_scan", "level_break", "earnings_setup"]
risk_constraints = ["No signal without invalidation level", "No breakout chase if ATR expansion already exhausted"]
outputs = ["buy-now/wait/wrong levels", "setup quality tier", "backtest bucket"]
notes = "Feeds execution previews and lbox-strategy-lab"

[[template.investment.strategies]]
id = "crowding-sentiment-watch"
name = "Crowding and Sentiment Watch"
thesis = "Retail/community movement and options positioning can accelerate or invalidate narrative-led trades"
lifecycle = "sandbox"
owner = "theme-harin"
universe = ["meme", "high-beta", "crypto", "event-driven equities"]
indicators = ["rsi-14-28", "bollinger-20-2"]
data_sources = ["reddit-forums", "options-positioning", "price-bars"]
triggers = ["mention_spike", "options_sweep", "community_breakout"]
risk_constraints = ["Must confirm with liquidity and spread checks", "No auto-live execution"]
outputs = ["crowding score", "social acceleration alert", "risk escalation note"]
notes = "High-noise strategy, intended to stay sandbox/paper until lbox-strategy-lab mature"

[[template.investment.strategies]]
id = "lbox-ownership-tracker"
name = "Whale and Insider Tracker"
thesis = "Persistent ownership change is a research prioritization engine and sometimes a medium-term conviction input"
lifecycle = "paper"
owner = "research-pm"
universe = ["us_equities"]
indicators = ["relative-strength-sector"]
data_sources = ["sec-filings", "whalewisdom-derived", "price-bars"]
triggers = ["13f_delta", "form4_cluster", "fund_letter_signal"]
risk_constraints = ["Treat filing-lag data as prioritization, not immediate execution"]
outputs = ["ownership delta card", "watchlist state transition", "escalation candidate"]
notes = "Pairs naturally with lbox-single-names desk deep dives"

[[template.investment.schedules]]
key = "company_open"
cadence = "daily 07:30 local"
owner = "main"
description = "Load overnight context, health checks, backlog, and priority watchlists"
channels = ["lbox-ops", "lbox-exec-committee", "lbox-macro"]

[[template.investment.schedules]]
key = "market_open"
cadence = "daily 09:00 local"
owner = "macro-minho"
description = "Open protocol for regime, liquidity, and first-15-minute anomaly control"
channels = ["lbox-macro", "lbox-flow"]

[[template.investment.schedules]]
key = "intraday_loop"
cadence = "every 15m"
owner = "research-pm"
description = "Single-name, flow, and alert queue refresh"
channels = ["lbox-ops", "lbox-single-names", "lbox-flow"]

[[template.investment.schedules]]
key = "market_close"
cadence = "daily 15:20 local"
owner = "risk-jaehyun"
description = "Close pack, unresolved case rollover, and tomorrow prep"
channels = ["lbox-risk", "lbox-decisions"]

[[template.investment.schedules]]
key = "strategy_review"
cadence = "weekly Fri 18:00 local"
owner = "research-pm"
description = "Scorecard review, degradation decisions, and sandbox promotion review"
channels = ["lbox-strategy-lab", "lbox-exec-committee"]

[template.investment.protocols.company_open]
title = "Company Open"
owner = "main"
when = "Before the firm starts active work"
channels = ["lbox-ops", "lbox-exec-committee"]
steps = [
  "Run health checks for data, Slack bridge, broker adapters, and ClawTeam sessions.",
  "Publish overnight summary: macro changes, new filings, ownership deltas, unresolved cases.",
  "Reload watchlists and strategy states, then announce the day's priority queue.",
]

[template.investment.protocols.market_open]
title = "Market Open"
owner = "macro-minho"
when = "At market open"
channels = ["lbox-macro", "lbox-flow"]
steps = [
  "Tag the opening regime and whether the first 15 minutes should be observed or traded.",
  "Publish liquidity, gap context, breadth, and positioning anomalies.",
  "Escalate only if market-open behavior invalidates overnight priors.",
]

[template.investment.protocols.market_close]
title = "Market Close"
owner = "risk-jaehyun"
when = "Near market close"
channels = ["lbox-risk", "lbox-decisions"]
steps = [
  "Summarize what changed versus the open thesis.",
  "Mark open cases as closed, rolled, or escalated.",
  "Log execution previews, fills, and any risk incidents for archive review.",
]

[template.investment.protocols.company_close]
title = "Company Close"
owner = "publisher-minji"
when = "After active work is done"
channels = ["lbox-archive"]
steps = [
  "Archive closed cases and publication outputs.",
  "Persist strategy lbox-strategy-lab and recommendation ledger snapshots.",
  "Prepare the next open protocol handoff note.",
]

[template.investment.protocols.always_on]
title = "Always-On Company Loop"
owner = "research-pm"
when = "24/7"
channels = ["lbox-ops"]
steps = [
  "Monitor filings, insider activity, community spikes, and broker incidents continuously.",
  "Create or update cases when triggers cross policy thresholds.",
  "Keep execution in preview or paper mode unless policy tier says otherwise.",
]

[template.investment.execution]
default_mode = "preview"
require_human_approval = true
allow_ceo_bypass = true
allowed_tiers = ["observe_only", "paper", "preview", "restricted_live"]
guardrails = [
  "Binance defaults to Demo Mode until a live endpoint is explicitly configured.",
  "tossinvest-cli remains supervised because it is unofficial and uses internal web APIs.",
  "Every live action must have a preview artifact, policy tier, and risk signoff.",
]

[[template.investment.execution.broker_adapters]]
broker = "binance"
mode = "preview"
markets = ["crypto-spot"]
capabilities = ["order test", "order place", "cancel", "cancel replace", "oco", "oto"]
notes = "Use Demo Mode for realistic paper execution, then graduate to live with explicit endpoint and key config"

[[template.investment.execution.broker_adapters]]
broker = "tossinvest"
mode = "preview"
markets = ["us-equity", "kr-equity"]
capabilities = ["read-only account summary", "order preview", "order place with confirm token", "cancel", "amend"]
notes = "Unofficial CLI; safe default is read-only plus preview until explicit grant and TTL permissions are in place"
